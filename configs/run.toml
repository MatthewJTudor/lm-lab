[seed]
seed = 42

[data]
corpus_path = "data/corpus.txt"
corpus = ""
block_size = 128

[tokenizer]
mode = "bpe"
bpe_vocab_size = 1024

[model]
d_model = 128
n_layers = 4
max_seq_len = 128
pos_mode = "learned"  # "sinusoidal" or "learned"

n_heads = 4
attn_bias = false
attn_impl = "naive"

mlp_hidden_mult = 4
activation = "gelu"

norm_mode = "pre"
layer_norm_eps = 1e-5

dropout = 0.0
tie_embeddings = true

[train]
steps = 2000
lr = 1e-3
log_every = 50

optimizer = "adamw"
weight_decay = 0.01
batch_size = 64
shuffle = false
grad_clip = 0.0
device = "cuda"

[gen]
temperature = 0.7
top_k = 0
top_p =0.9
max_new_tokens = 100
seed = 1337